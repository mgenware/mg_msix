name: mg_msix
description: A command-line tool that create Msix installer from your flutter windows-build files.
version: 3.18.0
maintainer: Yehuda Kremer (yehudakremer@gmail.com)
homepage: https://github.com/YehudaKremer/msix
issue_tracker: https://github.com/YehudaKremer/msix/issues
topics:
  - windows
  - tool
screenshots:
  - description: "A command-line tool that create Msix installer from your flutter windows-build files."
    path: doc/screenshot.png

platforms:
  windows:

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  args: ^2.0.0
  yaml: ^3.0.0
  path: ^1.0.0
  package_config: ">=2.0.0 <4.0.0"
  get_it: ^9.0.0
  image: ^4.0.0
  pub_semver: ^2.0.0
  console: ^4.0.0
  cli_util: ">=0.0.0 <1.0.0"

dev_dependencies:
  test: ^1.0.0
  flutter_lints: ^6.0.0
